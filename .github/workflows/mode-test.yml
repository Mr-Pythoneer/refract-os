name: mode-test

# Hardware-free but rigorous proof that Refract OS's 5 modes (gaming / ai /
# server / creative / normal) actually DO what they promise. Two jobs, mirroring
# the split we use elsewhere (install-smoke = overlay+chroot, boot-smoke =
# QEMU+VNC):
#
#   mechanism — mounts the SHIPPED live squashfs, overlays it writable, chroots
#               in, and runs tests/mode-mechanism.sh IN THE REAL IMAGE USERLAND.
#               For each of the 5 modes it runs the actual distro-modectl with
#               recording stubs first on PATH and asserts it issued EXACTLY the
#               contracted commands: CPU governor, power profile, GPU perf-state,
#               systemd services, GNOME theme/wallpaper/accent, AI model
#               load/unload, and the /run state file. This is the machine-checked
#               proof of the control plane — deterministic, no hardware.
#
#   live      — boots the ISO in QEMU to the GNOME desktop (reusing boot-smoke's
#               exact QEMU/VNC/serial/monitor recipe) and, over VNC, opens a
#               terminal and runs `sudo distro-modectl switch <mode> --yes` for a
#               representative subset (gaming/ai/server), screenshotting the
#               desktop before/after so the per-mode wallpaper VISIBLY changes
#               between modes. This is the visual proof the modes transform the
#               RUNNING desktop. FPS / LLM tokens-per-sec / power-draw NUMBERS are
#               hardware-only (real GPU box / Pi) and out of scope here.

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "build-iso run id to fetch the ISO artifact from (empty = latest successful FULL build)"
        required: false
        default: ""
      artifact:
        description: "ISO artifact name (empty = the run's full refract-os-<strain>)"
        required: false
        default: ""

jobs:
  mechanism:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build run + artifact
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN: ${{ inputs.build_run_id }}
          INPUT_ARTIFACT: ${{ inputs.artifact }}
        run: |
          set -euo pipefail
          # Resolve the artifact by NAME, never a bare `refract-os-*` glob: a
          # mode-omitted build uploads refract-os-<strain>-no<mode>, which matches
          # that glob — and this workflow asserts all 5 modes, so an -noai image
          # would fail on the very mode the build deliberately omitted. Likewise a
          # testing build's -DANGER-TESTING-NO-LOGIN image. A FULL build's artifact
          # is exactly refract-os-<strain> — no -no*/-DANGER tail.
          pick() {  # pick <run-id> -> wanted artifact name, empty if it has none
            local list
            list=$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs/$1/artifacts" \
                     --jq '.artifacts[] | select(.expired | not) | .name') || return 0
            if [ -n "$INPUT_ARTIFACT" ]; then
              printf '%s\n' "$list" | grep -xF -- "$INPUT_ARTIFACT" || true
            else
              printf '%s\n' "$list" | grep -E '^refract-os-[a-z0-9]+$' | head -n1 || true
            fi
          }
          if [ -n "$INPUT_RUN" ]; then
            id="$INPUT_RUN"; art=$(pick "$id")
          else
            # Newest-first, first run that STILL has the wanted artifact: a
            # -noai/DANGER (or expired) build is skipped, not silently tested.
            id=""; art=""
            for cand in $(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-iso.yml \
                            --status success --limit 20 --json databaseId -q '.[].databaseId'); do
              art=$(pick "$cand")
              if [ -n "$art" ]; then id="$cand"; break; fi
            done
          fi
          [ -n "$id" ] && [ -n "$art" ] || {
            echo "No build-iso run with a ${INPUT_ARTIFACT:-full refract-os-<strain>} artifact (mode-omitted/testing builds don't count — pass 'artifact' to force one)." >&2
            exit 1; }
          echo "using run $id, artifact $art"
          { echo "id=$id"; echo "artifact=$art"; } >> "$GITHUB_OUTPUT"

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact }}
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
          path: iso-dl

      - name: Mount the live squashfs
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y libarchive-tools squashfs-tools
          ISO=$(find iso-dl -name "*.iso" | head -n1); [ -n "$ISO" ] || { echo "no iso" >&2; exit 1; }
          mkdir -p x
          bsdtar -xf "$ISO" -C x casper/filesystem.squashfs
          ls -lh x/casper/filesystem.squashfs
          sudo mkdir -p /mnt/sq
          sudo mount -t squashfs -o loop,ro x/casper/filesystem.squashfs /mnt/sq

      - name: Run the 5-mode mechanism test in the real image userland (overlay + chroot)
        run: |
          set -euo pipefail
          # Overlay the read-only squashfs so we can drop the testkit in and run
          # it against the ACTUAL shipped Ubuntu userland (same pattern as
          # install-smoke). bind proc/sys/dev so the chrooted bash is realistic.
          mkdir -p up work root
          ovl="lowerdir=/mnt/sq,upperdir=$PWD/up,workdir=$PWD/work"
          sudo mount -t overlay overlay -o "$ovl" "$PWD/root"
          sudo mkdir -p root/opt/testkit
          sudo cp -a tests modes drivers root/opt/testkit/
          for fs in proc sys dev; do sudo mount --bind /$fs "root/$fs"; done

          echo "=== distro-modectl status (sanity: it runs in the image) ==="
          sudo chroot root /usr/local/bin/distro-modectl status || true

          # The switcher writes its state file to /run/distro-modectl (root:root
          # 0755 in the squashfs). Since the whole harness runs as uid 1000 (below),
          # pre-create that dir owned by 1000 as ROOT here, or the state-file write
          # (and its assertion) fails. The mode wallpapers already ship in the image
          # at /usr/share/backgrounds/refract, so the harness doesn't create those.
          sudo chroot root sh -c 'mkdir -p /run/distro-modectl && chown 1000:1000 /run/distro-modectl'

          echo "=== 5-mode mechanism assertions (real shipped distro-modectl) ==="
          # Run the switcher as a NON-root uid (1000), exactly like install-smoke:
          # the mode-mechanism harness's own id/sudo stubs then drive the
          # user-pass -> sudo re-exec -> root-pass flow hermetically. HOME/TMPDIR
          # under /tmp so the AI tier-file path is writable.
          sudo chroot root setpriv --reuid 1000 --regid 1000 --clear-groups \
            env HOME=/tmp TMPDIR=/tmp bash /opt/testkit/tests/mode-mechanism.sh | tee mechanism.out

          # Copy the per-tool command logs out of the chroot for the artifact.
          sudo cp -a root/tmp/modelog . 2>/dev/null || true
          sudo chown -R "$USER" modelog 2>/dev/null || true

          for fs in proc sys dev; do sudo umount "root/$fs" || true; done
          sudo umount root || true
          echo "MECHANISM PROOF: every mode issued exactly its contracted commands (see above)."

      - name: Upload mechanism command logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mode-mechanism-logs
          path: |
            modelog/
            mechanism.out
          if-no-files-found: warn
          retention-days: 14

  live:
    # Best-effort VISUAL proof (VNC pixel-driving is inherently fragile). The
    # machine-checked correctness lives in the `mechanism` job; a flaky live run
    # must not mask a green mechanism, so its failure doesn't fail the workflow.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build run + artifact
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN: ${{ inputs.build_run_id }}
          INPUT_ARTIFACT: ${{ inputs.artifact }}
        run: |
          set -euo pipefail
          # Resolve the artifact by NAME, never a bare `refract-os-*` glob: a
          # mode-omitted build uploads refract-os-<strain>-no<mode>, which matches
          # that glob — and this workflow asserts all 5 modes, so an -noai image
          # would fail on the very mode the build deliberately omitted. Likewise a
          # testing build's -DANGER-TESTING-NO-LOGIN image. A FULL build's artifact
          # is exactly refract-os-<strain> — no -no*/-DANGER tail.
          pick() {  # pick <run-id> -> wanted artifact name, empty if it has none
            local list
            list=$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs/$1/artifacts" \
                     --jq '.artifacts[] | select(.expired | not) | .name') || return 0
            if [ -n "$INPUT_ARTIFACT" ]; then
              printf '%s\n' "$list" | grep -xF -- "$INPUT_ARTIFACT" || true
            else
              printf '%s\n' "$list" | grep -E '^refract-os-[a-z0-9]+$' | head -n1 || true
            fi
          }
          if [ -n "$INPUT_RUN" ]; then
            id="$INPUT_RUN"; art=$(pick "$id")
          else
            # Newest-first, first run that STILL has the wanted artifact: a
            # -noai/DANGER (or expired) build is skipped, not silently tested.
            id=""; art=""
            for cand in $(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-iso.yml \
                            --status success --limit 20 --json databaseId -q '.[].databaseId'); do
              art=$(pick "$cand")
              if [ -n "$art" ]; then id="$cand"; break; fi
            done
          fi
          [ -n "$id" ] && [ -n "$art" ] || {
            echo "No build-iso run with a ${INPUT_ARTIFACT:-full refract-os-<strain>} artifact (mode-omitted/testing builds don't count — pass 'artifact' to force one)." >&2
            exit 1; }
          echo "using run $id, artifact $art"
          { echo "id=$id"; echo "artifact=$art"; } >> "$GITHUB_OUTPUT"

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact }}
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
          path: iso-dl

      - name: Prepare QEMU + KVM + vncdotool
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils socat python3-pip imagemagick
          pipx install vncdotool 2>/dev/null || pip install --user vncdotool
          ISO=$(find iso-dl -name "*.iso" | head -n1)
          [ -n "$ISO" ] || { echo "No .iso in the artifact." >&2; exit 1; }
          mv "$ISO" refract.iso
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "ACCEL=kvm" >> "$GITHUB_ENV"
          else
            echo "WARNING: /dev/kvm missing — falling back to TCG (slow)." >&2
            echo "ACCEL=tcg" >> "$GITHUB_ENV"
          fi

      - name: "Boot to GNOME, then switch modes over VNC (visual proof)"
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p shots
          # Same QEMU recipe as boot-smoke Phase A: headless, VGA std, VNC :0, a
          # unix monitor socket for screendumps, -daemonize.
          qemu-system-x86_64 -accel "$ACCEL" -m 4096 -smp 4 \
            -cdrom refract.iso -boot d \
            -display none -vga std -vnc :0 \
            -monitor unix:mon.sock,server,nowait \
            -pidfile qemu.pid -daemonize
          # NOTE (from boot-smoke run 28569864278): under -daemonize QEMU chdirs
          # to /, so screendump MUST get an ABSOLUTE path or the ppm silently
          # lands in a nonexistent /shots. socat exits 0 even on monitor errors,
          # so also verify the file appeared.
          mon() { printf '%s\n' "$1" | socat - unix-connect:mon.sock >/dev/null; }
          shot() { mon "screendump $PWD/shots/$1.ppm"; sleep 1; [ -f "shots/$1.ppm" ] || echo "WARN: screendump $1 did not appear" >&2; }
          vd() { vncdo -s localhost:0 "$@"; }

          echo "Waiting for the live GNOME desktop to come up (~3.5 min)..."
          sleep 210
          shot 00-base-desktop

          # Open a terminal via the Activities overview: Super, type "Terminal",
          # Enter. Robust, no pixel-hunting (same approach install-smoke uses to
          # launch Calamares).
          vd key super; sleep 3; shot 01-overview
          vd type "Terminal"; sleep 3
          vd key enter; sleep 8
          shot 02-terminal-open

          # For a representative subset, run the real switcher and screenshot the
          # desktop AFTER each switch. The per-mode WALLPAPER should VISIBLY differ
          # between shots; the macOS WhiteSur GTK/icon theme is intentionally kept
          # CONSTANT across modes (no per-mode accent recolor anymore). --yes
          # auto-confirms server's display-manager prompt; passwordless sudo on
          # the casper live user makes `sudo` non-interactive.
          switch_and_shot() {   # switch_and_shot <mode> <shotname>
            local mode="$1" name="$2"
            vd type "sudo distro-modectl switch ${mode} --yes"; sleep 1
            vd key enter
            # give apply_theme + the sudo re-exec time to repaint the desktop
            sleep 12
            shot "$name"
          }
          # gaming last-but-one and server LAST on purpose: server disables gdm
          # (--now), which can tear down the session, so capture it after the
          # others. ai in the middle. Each shot is the running desktop post-switch.
          switch_and_shot gaming 03-gaming
          switch_and_shot ai     04-ai
          switch_and_shot server 05-server

          shot 06-final
          mon "quit" || true

          # ppm -> png for the artifact.
          for f in shots/*.ppm; do
            [ -e "$f" ] || continue
            convert "$f" "${f%.ppm}.png" && rm -f "$f" || true
          done
          ls -lh shots/ || true

          # Assert SOMETHING rendered on the final desktop shot (>1 distinct pixel
          # value => not a blank screen). Same guard boot-smoke uses. This proves
          # a live desktop was driven; the human-visible wallpaper change
          # between 03/04/05 is what the uploaded screenshots demonstrate.
          python3 - <<'PY'
          import sys, glob
          def distinct(path):
              with open(path, "rb") as f:
                  data = f.read()
              parts = data.split(b"\n", 3)
              px = parts[-1]
              return len(set(px[i:i+3] for i in range(0, min(len(px), 3*1000000), 3)))
          finals = sorted(glob.glob("shots/06-final.png") + glob.glob("shots/05-server.png"))
          # PNGs are compressed; re-decode via imagemagick would be needed for a
          # true pixel count, so just assert the files exist and are non-trivial.
          import os
          ok = any(os.path.getsize(p) > 2000 for p in finals) if finals else False
          print("final screenshots:", finals)
          sys.exit(0 if ok else 1)
          PY

          echo "=================================================================="
          echo "VISUAL PROOF: the uploaded screenshots (03-gaming / 04-ai / 05-server)"
          echo "show the SAME running GNOME desktop with the per-mode WALLPAPER changed"
          echo "by each 'distro-modectl switch' (the WhiteSur theme stays constant)."
          echo "NOT proven here (hardware-only, needs a real GPU box / Pi):"
          echo "  * in-game FPS from performance governor + pinned GPU clocks"
          echo "  * LLM tokens/sec + model load in AI mode (needs Ollama + model)"
          echo "  * real CPU-frequency / power-draw / wattage changes"
          echo "  * nvidia-smi clock-lock / persistence actually taking hold on silicon"
          echo "=================================================================="

      - name: Upload live desktop evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mode-live-evidence
          path: |
            shots/
          if-no-files-found: warn
          retention-days: 14
