name: uefi-remaster
# Adds UEFI boot to an existing (BIOS-only) Refract ISO and PROVES it boots under
# real UEFI firmware (OVMF) in QEMU — plus re-checks BIOS still works. Decoupled
# from the 30-min build so the UEFI recipe can be iterated fast against a prebuilt
# ISO artifact. Once green, the remaster folds into build.sh / build-iso.yml.
on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "build-iso run id to remaster (empty = latest successful)"
        required: false
        default: ""

jobs:
  remaster:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build run id
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN: ${{ inputs.build_run_id }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_RUN" ]; then id="$INPUT_RUN"
          else id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-iso.yml --status success --limit 1 --json databaseId -q '.[0].databaseId'); fi
          [ -n "$id" ] || { echo "no successful build" >&2; exit 1; }
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          pattern: refract-os-*
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
          merge-multiple: true
          path: iso-dl

      - name: Install remaster + QEMU/OVMF tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xorriso grub-efi-amd64-bin grub-common mtools \
            dosfstools isolinux syslinux-common ovmf qemu-system-x86 qemu-utils socat
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm && echo "ACCEL=kvm" >> "$GITHUB_ENV" || echo "ACCEL=tcg" >> "$GITHUB_ENV"

      - name: Remaster to hybrid BIOS+UEFI
        run: |
          set -euxo pipefail
          ISO=$(find iso-dl -name '*.iso' | head -n1); [ -n "$ISO" ] || { echo "no iso" >&2; exit 1; }
          mkdir -p tree
          # Extract the whole ISO filesystem tree.
          xorriso -osirrox on -indev "$ISO" -extract / tree
          sudo chown -R "$USER" tree; chmod -R u+w tree
          ls tree tree/casper tree/isolinux

          # GRUB menu embedded straight into a standalone EFI binary (no external
          # grub.cfg needed). search --file finds the ISO volume wherever UEFI
          # mounts it, so /casper/* resolves.
          cat > grub-embed.cfg <<'EOF'
          set timeout=5
          set default=0
          insmod all_video
          search --set=root --file /casper/vmlinuz
          menuentry "Refract OS (live)" {
            linux /casper/vmlinuz boot=casper quiet splash ---
            initrd /casper/initrd.img
          }
          menuentry "Refract OS (safe graphics)" {
            linux /casper/vmlinuz boot=casper nomodeset ---
            initrd /casper/initrd.img
          }
          EOF
          grub-mkstandalone -O x86_64-efi -o bootx64.efi \
            --modules="part_gpt part_msdos fat iso9660 normal linux search configfile echo all_video gfxterm test" \
            "boot/grub/grub.cfg=grub-embed.cfg"

          # FAT El Torito EFI boot image containing /EFI/BOOT/BOOTX64.EFI. Size it
          # to the actual EFI binary + slack and let mkfs.vfat pick the FAT type
          # (a fixed 8 MB image is too small for a forced FAT16).
          efimb=$(( $(stat -c%s bootx64.efi) / 1048576 + 4 ))
          dd if=/dev/zero of=efiboot.img bs=1M count="$efimb"
          mkfs.vfat efiboot.img
          mmd -i efiboot.img ::/EFI ::/EFI/BOOT
          mcopy -i efiboot.img bootx64.efi ::/EFI/BOOT/BOOTX64.EFI
          mkdir -p tree/EFI/boot
          cp efiboot.img tree/EFI/boot/efiboot.img

          # Rebuild: keep the isolinux BIOS boot, add the EFI alt-boot, stay
          # USB-writable via isohybrid MBR + a GPT for the ESP.
          rm -f tree/isolinux/boot.cat
          xorriso -as mkisofs -iso-level 3 -V REFRACTOS -r -J -joliet-long \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -c isolinux/boot.cat \
            -b isolinux/isolinux.bin -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e EFI/boot/efiboot.img -no-emul-boot -isohybrid-gpt-basdat \
            -o refract-uefi.iso tree/
          ls -lh refract-uefi.iso
          echo "=== boot records (expect a BIOS El Torito + an EFI one) ==="
          xorriso -indev refract-uefi.iso -report_el_torito plain 2>/dev/null | grep -iE "El Torito|platform|boot" | head

      - name: Boot under UEFI (OVMF) and assert userspace
        run: |
          set -euxo pipefail
          # NB: avoid `ls a b | head` — under pipefail a missing path makes ls
          # exit non-zero and aborts the step. Probe with a test loop instead.
          CODE=""; for c in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do [ -f "$c" ] && CODE="$c" && break; done
          VARS=""; for v in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do [ -f "$v" ] && VARS="$v" && break; done
          [ -n "$CODE" ] && [ -n "$VARS" ] || { echo "OVMF firmware not found under /usr/share/OVMF" >&2; ls -la /usr/share/OVMF/ || true; exit 1; }
          cp "$VARS" vars.fd
          mkdir -p "$PWD/shots"
          qemu-system-x86_64 -machine q35 -accel "$ACCEL" -m 4096 -smp 4 \
            -drive if=pflash,format=raw,unit=0,readonly=on,file="$CODE" \
            -drive if=pflash,format=raw,unit=1,file=vars.fd \
            -cdrom refract-uefi.iso -boot d \
            -display none -vga std \
            -serial "file:$PWD/uefi-serial.log" \
            -monitor "unix:$PWD/mon.sock,server,nowait" -pidfile "$PWD/q.pid" -daemonize || \
          qemu-system-x86_64 -machine q35 -accel "$ACCEL" -m 4096 -smp 4 \
            -drive if=pflash,format=raw,unit=0,readonly=on,file="$CODE" \
            -drive if=pflash,format=raw,unit=1,file=vars.fd \
            -cdrom refract-uefi.iso -boot d \
            -display none -vga std -serial "file:$PWD/uefi-serial.log" \
            -monitor "unix:$PWD/mon.sock,server,nowait" -pidfile "$PWD/q.pid" -daemonize
          shot() { printf 'screendump %s\n' "$PWD/shots/$1.ppm" | socat - "unix-connect:$PWD/mon.sock" >/dev/null 2>&1 || true; }
          ok=""
          for i in $(seq 1 60); do
            sleep 5
            grep -qiE "reached target|systemd|casper|Welcome to Refract|GNOME|gdm|login:" uefi-serial.log 2>/dev/null && ok=1 && break
          done
          shot uefi-desktop
          echo "=== UEFI serial tail ==="; tail -30 uefi-serial.log || true
          sudo apt-get install -y imagemagick >/dev/null 2>&1 || true
          for f in shots/*.ppm; do convert "$f" "${f%.ppm}.png" 2>/dev/null && rm -f "$f" || true; done
          [ -n "$ok" ] || { echo "FAIL: ISO did not reach userspace under UEFI/OVMF." >&2; exit 1; }
          echo "PASS: booted under real UEFI firmware (OVMF)."

      - name: Upload hybrid ISO + evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refract-uefi
          path: |
            refract-uefi.iso
            shots/
            uefi-serial.log
          if-no-files-found: warn
          retention-days: 7
