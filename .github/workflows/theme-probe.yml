name: theme-probe
on: { workflow_dispatch: {} }
jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Deps
        run: sudo apt-get update && sudo apt-get install -y sassc libglib2.0-dev-bin libxml2-utils git util-linux
      - name: WhiteSur under pseudo-TTY + HOME/USER (candidate final fix)
        run: |
          set +e
          git clone --depth 1 https://github.com/vinceliuice/WhiteSur-gtk-theme.git ws
          rm -rf /tmp/WhiteSur.lock; mkdir -p /tmp/outC
          env HOME=/root USER=root script -qfec "bash ws/install.sh -d /tmp/outC" /dev/null 2>&1 | tail -22
          echo "==== result ===="
          ls -d /tmp/outC/WhiteSur-Dark 2>/dev/null && echo "OK_C" || echo "MISSING_C"
          ls /tmp/outC 2>/dev/null || true
