name: uefi-boot
# Verifies a build's ISO boots under REAL UEFI firmware (OVMF) in QEMU. Since
# build.sh now folds the UEFI hybrid-remaster into the build, the published ISO
# is already BIOS+UEFI — this just boots it under OVMF and asserts userspace.
# (Replaces the old uefi-remaster.yml, whose remaster logic now lives in build.sh.)
on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "build-iso run id (empty = latest successful FULL build)"
        required: false
        default: ""
      artifact:
        description: "ISO artifact name (empty = the run's full refract-os-<strain>)"
        required: false
        default: ""

jobs:
  uefi:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - name: Resolve build run + artifact
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN: ${{ inputs.build_run_id }}
          INPUT_ARTIFACT: ${{ inputs.artifact }}
        run: |
          set -euo pipefail
          # Resolve the artifact by NAME with the SAME strict resolver as the boot-
          # smoke / install-smoke siblings — never a bare `refract-os-*` glob. A
          # mode-omitted build uploads refract-os-<strain>-no<mode> and a testing
          # build appends -DANGER-TESTING-NO-LOGIN; both match refract-os-* and the
          # old `pattern: refract-os-*` download would silently boot a -noai or
          # DANGER image under UEFI and red-X on a phantom defect. A FULL build's
          # artifact is exactly refract-os-<strain> — no -no*/-DANGER tail.
          pick() {  # pick <run-id> -> wanted artifact name, empty if it has none
            local list
            list=$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs/$1/artifacts" \
                     --jq '.artifacts[] | select(.expired | not) | .name') || return 0
            if [ -n "$INPUT_ARTIFACT" ]; then
              printf '%s\n' "$list" | grep -xF -- "$INPUT_ARTIFACT" || true
            else
              printf '%s\n' "$list" | grep -E '^refract-os-[a-z0-9]+$' | head -n1 || true
            fi
          }
          if [ -n "$INPUT_RUN" ]; then
            id="$INPUT_RUN"; art=$(pick "$id")
          else
            # Newest-first, first run that STILL has the wanted artifact: a
            # -noai/DANGER (or expired) build is skipped, not silently booted.
            id=""; art=""
            for cand in $(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-iso.yml \
                            --status success --limit 20 --json databaseId -q '.[].databaseId'); do
              art=$(pick "$cand")
              if [ -n "$art" ]; then id="$cand"; break; fi
            done
          fi
          [ -n "$id" ] && [ -n "$art" ] || {
            echo "No build-iso run with a ${INPUT_ARTIFACT:-full refract-os-<strain>} artifact (mode-omitted/testing builds don't count — pass 'artifact' to force one)." >&2
            exit 1; }
          echo "using run $id, artifact $art"
          { echo "id=$id"; echo "artifact=$art"; } >> "$GITHUB_OUTPUT"
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact }}
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
          path: iso-dl
      - name: Tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils socat ovmf imagemagick xorriso
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm && echo "ACCEL=kvm" >> "$GITHUB_ENV" || echo "ACCEL=tcg" >> "$GITHUB_ENV"
      - name: Confirm the ISO carries a UEFI El Torito record
        run: |
          set -euo pipefail
          ISO=$(find iso-dl -name '*.iso' | head -n1); [ -n "$ISO" ] || { echo "no iso" >&2; exit 1; }
          echo "ISO=$ISO" >> "$GITHUB_ENV"
          echo "=== El Torito boot records (expect BIOS + UEFI) ==="
          xorriso -indev "$ISO" -report_el_torito plain 2>/dev/null | grep -iE "Pltf|boot img" || true
          xorriso -indev "$ISO" -report_el_torito plain 2>/dev/null | grep -qi "UEFI" \
            || { echo "FAIL: ISO has no UEFI El Torito record — the build's remaster didn't run." >&2; exit 1; }
      - name: Boot under UEFI (OVMF) and assert userspace
        run: |
          set -uxo pipefail
          CODE=""; for c in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do [ -f "$c" ] && CODE="$c" && break; done
          VARS=""; for v in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do [ -f "$v" ] && VARS="$v" && break; done
          [ -n "$CODE" ] && [ -n "$VARS" ] || { echo "OVMF firmware not found" >&2; ls -la /usr/share/OVMF/ || true; exit 1; }
          cp "$VARS" vars.fd; mkdir -p "$PWD/shots"
          qemu-system-x86_64 -machine q35 -accel "$ACCEL" -m 4096 -smp 4 \
            -drive if=pflash,format=raw,unit=0,readonly=on,file="$CODE" \
            -drive if=pflash,format=raw,unit=1,file=vars.fd \
            -cdrom "$ISO" -boot d -display none -vga std \
            -serial "file:$PWD/uefi-serial.log" \
            -monitor "unix:$PWD/mon.sock,server,nowait" -pidfile "$PWD/q.pid" -daemonize
          set +e
          shot() { printf 'screendump %s\n' "$PWD/shots/$1.ppm" | socat - "unix-connect:$PWD/mon.sock" >/dev/null 2>&1 || true; }
          ok=""
          for i in $(seq 1 50); do
            sleep 6
            # LATE marker only: require the graphical target / a display manager / a
            # login prompt. A bare "reached target" fires for Swap / Local FS and
            # "systemd[1]" fires the instant PID 1 starts — both are reached long
            # before userspace is actually up. "casper" is dropped entirely: the
            # ISO's grub cmdline carries "boot=casper" (build.sh grub.cfg), so the
            # kernel's "Command line: ... boot=casper" echo would green-light this
            # before anything booted. The UEFI grub path DOES set console=ttyS0
            # (build.sh:606-618), so these systemd markers do reach uefi-serial.log.
            if grep -qiE "reached target graphical|graphical\.target|started gnome display manager|\bgdm3?\b|login:" uefi-serial.log 2>/dev/null; then ok=1; fi
            case "$i" in 15|25|35) shot "uefi-$i" ;; esac
            [ -n "$ok" ] && [ "$i" -ge 30 ] && break
          done
          shot uefi-final
          echo "=== UEFI serial tail ==="; tail -40 uefi-serial.log || true
          for f in shots/*.ppm; do convert "$f" "${f%.ppm}.png" 2>/dev/null && rm -f "$f" || true; done
          [ -n "$ok" ] || { echo "FAIL: no graphical-userspace signal (graphical target / display manager / login) on serial under UEFI/OVMF." >&2; exit 1; }
          echo "PASS: Refract reached graphical userspace under real UEFI firmware (OVMF)."
      - name: Upload UEFI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uefi-boot-evidence
          path: |
            shots/
            uefi-serial.log
          if-no-files-found: warn
          retention-days: 7
