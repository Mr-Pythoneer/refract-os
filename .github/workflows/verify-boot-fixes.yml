name: verify-boot-fixes

# Definitive proof that the real-hardware boot fixes are PHYSICALLY present in a
# built ISO's root filesystem — mounts the ISO, mounts casper/filesystem.squashfs
# (the exact tree that becomes the installed/live OS), and asserts each fix as a
# file/content check. This is stronger than trusting build-log echoes.

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "build-iso run id to fetch the ISO from (any strain)"
        required: true

jobs:
  inspect-squashfs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `gh run download` needs actions:read to fetch another run's artifact; the
    # default GITHUB_TOKEN is read-contents-only and would 403 without this
    # (matches boot-smoke / uefi-boot / install-smoke / mode-test).
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download the built ISO
        run: |
          set -euo pipefail
          # -p (glob), not -n (exact): the artifact is refract-os-<strain> only for
          # a full build — a mode-omitted one is refract-os-<strain>-no<mode> and a
          # testing one appends -DANGER-TESTING-NO-LOGIN, and `-n refract-os-laptop`
          # hard-fails on every one of those. The run id is an explicit input, so
          # whatever ISO that run produced is the ISO we were asked to verify.
          gh run download "${{ inputs.build_run_id }}" --repo "${{ github.repository }}" \
            -p 'refract-os-*' -D iso-dl
          # Glob the ISO too: a testing build's file is renamed
          # DANGER-DO-NOT-USE-TESTING-NO-LOGIN-refract-os-<strain>.iso, and `-p`
          # extracts each artifact into its own iso-dl/<artifact-name>/ subdir.
          iso=$(find iso-dl -name '*.iso' | head -n1)
          [ -n "$iso" ] || { echo "No .iso in run ${{ inputs.build_run_id }}'s artifacts." >&2; exit 1; }
          ls -lh "$iso"
          echo "ISO=$PWD/$iso" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Mount ISO + squashfs
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y squashfs-tools >/dev/null
          sudo mkdir -p /mnt/iso /mnt/sq
          sudo mount -o loop,ro "$ISO" /mnt/iso
          echo "ISO contents (casper):"; ls -la /mnt/iso/casper/ | grep -E "squashfs|vmlinuz|initrd|manifest" || true
          sudo mount -t squashfs -o loop,ro /mnt/iso/casper/filesystem.squashfs /mnt/sq
          echo "squashfs mounted."

      - name: Assert every boot fix is physically in the image
        run: |
          set -uo pipefail
          SQ=/mnt/sq
          fail=0
          chk() { # name, test-cmd
            if eval "$2" >/dev/null 2>&1; then echo "  PASS  $1"; else echo "  FAIL  $1"; fail=1; fi
          }
          echo "=== GDM forced to Xorg ==="
          # custom.conf is the file Ubuntu's gdm3 READS. This used to assert on
          # daemon.conf (Debian's name) — the same file the hook wrote — so it
          # passed while the setting was inert and the machine booted Wayland.
          # Assert the real one; daemon.conf is checked too, but it is the inert
          # belt-and-braces copy, not the thing that makes the fix work.
          chk "WaylandEnable=false in /etc/gdm3/custom.conf (the file Ubuntu gdm3 reads)" \
              "grep -q '^WaylandEnable=false' $SQ/etc/gdm3/custom.conf"
          chk "WaylandEnable=false in /etc/gdm3/daemon.conf (inert Debian-name copy)" \
              "grep -q '^WaylandEnable=false' $SQ/etc/gdm3/daemon.conf"
          echo "=== Xorg session exists (so gdm has something to launch) ==="
          chk "ubuntu-xorg.desktop present" \
              "test -e $SQ/usr/share/xsessions/ubuntu-xorg.desktop"
          echo "=== Intel forced to modesetting, legacy DDX gone ==="
          chk "xorg.conf.d/20-intel-modesetting.conf forces modesetting" \
              "grep -qi 'modesetting' $SQ/etc/X11/xorg.conf.d/20-intel-modesetting.conf"
          chk "legacy intel DDX (intel_drv.so) is PURGED" \
              "! test -e $SQ/usr/lib/xorg/modules/drivers/intel_drv.so"
          chk "modesetting driver IS available" \
              "test -e $SQ/usr/lib/xorg/modules/drivers/modesetting_drv.so"
          echo "=== no Ubuntu setup wizard ==="
          chk "gnome-initial-setup binary is PURGED" \
              "! test -e $SQ/usr/libexec/gnome-initial-setup"
          echo "=== firmware for the iGPU is present ==="
          chk "i915 DMC/GuC firmware dir present" \
              "test -d $SQ/lib/firmware/i915"
          echo
          echo "=== installer polkit grant is LIVE-ONLY (security) ==="
          # SECURITY: the passwordless installer grant must NOT be in the installed
          # tree. If 49-refract-installer.rules shipped inside the squashfs, it
          # would land on every installed desktop, where any local+active user
          # could 'pkexec bash' into a passwordless root shell. It is now written
          # by the casper-bottom hook into the LIVE overlay only (an installed
          # system never runs casper-bottom), so the installed squashfs must be
          # rule-free.
          chk "installed squashfs has NO 49-refract-installer.rules (no passwordless root)" \
              "! test -e $SQ/etc/polkit-1/rules.d/49-refract-installer.rules"
          # ...but the live-only generator MUST still ship, or the live installer
          # loses its passwordless disk/pkexec/reboot grant and can't launch. The
          # casper-bottom hook is baked into the initrd from this squashfs path and
          # writes the rule into /root (the live overlay) at boot.
          chk "casper-bottom hook 25-refract-install-icon ships (live grant generator)" \
              "test -e $SQ/usr/share/initramfs-tools/scripts/casper-bottom/25-refract-install-icon"
          chk "that hook writes the live installer polkit rule at boot" \
              "grep -q '49-refract-installer.rules' $SQ/usr/share/initramfs-tools/scripts/casper-bottom/25-refract-install-icon"
          echo
          echo "=== installed-package cross-check (filesystem.manifest) ==="
          MAN=/mnt/iso/casper/filesystem.manifest
          chk "manifest: xserver-xorg-video-intel ABSENT" \
              "! grep -q '^xserver-xorg-video-intel' $MAN"
          chk "manifest: gnome-initial-setup ABSENT" \
              "! grep -q '^gnome-initial-setup' $MAN"
          chk "manifest: ubuntu-session PRESENT (provides the xsession)" \
              "grep -q '^ubuntu-session' $MAN"
          chk "manifest: gnome-shell PRESENT" \
              "grep -q '^gnome-shell' $MAN"
          echo
          if [ "$fail" = 0 ]; then
            echo "ALL BOOT FIXES VERIFIED PRESENT IN THE SHIPPED IMAGE."
          else
            echo "ONE OR MORE FIXES MISSING FROM THE IMAGE — DO NOT FLASH."; exit 1
          fi

      - name: Cleanup
        if: always()
        run: sudo umount /mnt/sq /mnt/iso 2>/dev/null || true
