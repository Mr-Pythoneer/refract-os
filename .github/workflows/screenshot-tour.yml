name: screenshot-tour
# Boots a built ISO in QEMU and drives GNOME over VNC to capture a rich set of
# "inside the OS" screenshots: desktop, Activities overview, app grid, a terminal
# showing /etc/os-release = "Refract OS", Settings -> About, and Files. Best-effort
# (VNC pixel-driving is flaky) — every step screenshots and all shots are uploaded.
on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "build-iso run id (empty = latest successful FULL build)"
        required: false
        default: ""
      artifact:
        description: "ISO artifact name (empty = the run's full refract-os-<strain>)"
        required: false
        default: ""

jobs:
  tour:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build run + artifact
        id: run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN: ${{ inputs.build_run_id }}
          INPUT_ARTIFACT: ${{ inputs.artifact }}
        run: |
          set -euo pipefail
          # Resolve the artifact by NAME, never a bare `refract-os-*` glob: a
          # mode-omitted build uploads refract-os-<strain>-no<mode> and a testing
          # build appends -DANGER-TESTING-NO-LOGIN. Both match that glob — and
          # these screenshots are published as what Refract OS looks like, so
          # touring an -noai/DANGER image is worse than a red X. A FULL build's
          # artifact is exactly refract-os-<strain> — no -no*/-DANGER tail.
          pick() {  # pick <run-id> -> wanted artifact name, empty if it has none
            local list
            list=$(gh api --paginate "repos/$GITHUB_REPOSITORY/actions/runs/$1/artifacts" \
                     --jq '.artifacts[] | select(.expired | not) | .name') || return 0
            if [ -n "$INPUT_ARTIFACT" ]; then
              printf '%s\n' "$list" | grep -xF -- "$INPUT_ARTIFACT" || true
            else
              printf '%s\n' "$list" | grep -E '^refract-os-[a-z0-9]+$' | head -n1 || true
            fi
          }
          if [ -n "$INPUT_RUN" ]; then
            id="$INPUT_RUN"; art=$(pick "$id")
          else
            id=""; art=""
            for cand in $(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-iso.yml \
                            --status success --limit 20 --json databaseId -q '.[].databaseId'); do
              art=$(pick "$cand")
              if [ -n "$art" ]; then id="$cand"; break; fi
            done
          fi
          [ -n "$id" ] && [ -n "$art" ] || {
            echo "No build-iso run with a ${INPUT_ARTIFACT:-full refract-os-<strain>} artifact (mode-omitted/testing builds don't count — pass 'artifact' to force one)." >&2
            exit 1; }
          echo "using run $id, artifact $art"
          { echo "id=$id"; echo "artifact=$art"; } >> "$GITHUB_OUTPUT"
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.run.outputs.artifact }}
          run-id: ${{ steps.run.outputs.id }}
          github-token: ${{ github.token }}
          path: iso-dl
      - name: Prepare QEMU + vncdotool
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils socat python3-pip imagemagick
          pipx install vncdotool 2>/dev/null || pip install --user vncdotool
          ISO=$(find iso-dl -name "*.iso" | head -n1); [ -n "$ISO" ] || { echo "no iso" >&2; exit 1; }
          mv "$ISO" refract.iso
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm && echo "ACCEL=kvm" >> "$GITHUB_ENV" || echo "ACCEL=tcg" >> "$GITHUB_ENV"
      - name: Boot + drive GNOME, capture the tour
        run: |
          set -uo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p "$PWD/shots"
          qemu-system-x86_64 -accel "$ACCEL" -m 4096 -smp 4 \
            -cdrom refract.iso -boot d -display none -vga std -vnc :0 \
            -monitor "unix:$PWD/mon.sock,server,nowait" -pidfile "$PWD/qemu.pid" -daemonize
          mon() { printf '%s\n' "$1" | socat - "unix-connect:$PWD/mon.sock" >/dev/null 2>&1; }
          shot() { mon "screendump $PWD/shots/$1.ppm"; sleep 1; }
          vd() { vncdo -s localhost:0 "$@" 2>/dev/null || true; }

          echo "Waiting for the live GNOME desktop (~3.5 min)..."
          sleep 210
          shot 00-desktop
          vd key super;  sleep 3; shot 01-overview
          # App grid: the 9-dots is the rightmost dock icon (dock centered at bottom).
          vd key esc; sleep 2; vd move 831 763; vd click 1; sleep 3; shot 02-app-grid
          vd key esc; sleep 2

          # Terminal -> show the OS identity from /etc/os-release.
          vd key super; sleep 2; vd type "Terminal"; sleep 2; vd key enter; sleep 8
          shot 03-terminal
          vd type "cat /etc/os-release; echo; hostnamectl 2>/dev/null | head -3"; vd key enter; sleep 4
          shot 04-os-release
          vd type "distro-modectl status"; vd key enter; sleep 3
          shot 05-modectl-status

          # Settings -> About (shows "Refract OS" + the logo).
          vd key super; sleep 2; vd type "About"; sleep 2; vd key enter; sleep 8
          shot 06-about

          # Files.
          vd key super; sleep 2; vd type "Files"; sleep 2; vd key enter; sleep 6
          shot 07-files

          shot 08-final
          mon "quit" || true
          for f in shots/*.ppm; do convert "$f" "${f%.ppm}.png" 2>/dev/null && rm -f "$f" || true; done
          ls -lh shots/ || true
      - name: Upload tour screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refract-tour
          path: shots/
          if-no-files-found: warn
          retention-days: 14
