name: ai-serve-smoke

# Partially closes the AI-mode "needs hardware" TODO by proving the FUNCTIONAL
# half on CPU: the OpenAI-compatible :11434 serve contract + thin-client answer,
# and that real Ollama installs/serves headless. The GPU half (Vulkan offload to
# the Arc iGPU, CUDA offload on the 5090, tokens/sec, VRAM fit) stays
# hardware-gated — a runner has no usable GPU, so we can only prove CPU inference
# here.
#
# This installs the SAME pinned Ollama tarball the ISO ships (see
# modes/ai/setup/01-install-ollama.sh), starts `ollama serve`, pulls a tiny
# CPU-friendly model, then asserts in order:
#   1. GET  /api/tags            -> 200 (native REST is up, model is installed).
#   2. POST /v1/chat/completions -> a well-formed OpenAI completion. The api_key
#      is required-but-ignored on Ollama's OpenAI surface, so we pass the literal
#      "ollama"; the "model" field is MANDATORY there (unlike native /api/*).
#   3. modes/ai/bin/distro-ai-ask returns a real answer — the exact thin-client
#      contract the overlay + Nautilus action + AI mode all use.
# Deterministic and always-green on ubuntu-latest: no GPU, no GUI, no Docker.

on:
  workflow_dispatch:

jobs:
  ollama-serve-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Pin the SAME version the ISO ships so CI exercises the shipped runtime.
      OLLAMA_VERSION: "0.32.0"
      # A tiny instruct model: fast CPU inference, small pull. Exact tag, never
      # ':latest', mirroring the repo's pin-everything rule.
      OLLAMA_TEST_MODEL: "qwen2.5:0.5b"
      # Serve + client + distro-ai-ask all target this. Default Ollama bind.
      OLLAMA_HOST: "127.0.0.1:11434"
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned Ollama tarball into /usr (same method as 01-install-ollama.sh)
        run: |
          set -euo pipefail
          # unzstd (from the zstd package) unpacks the .tar.zst. Usually present
          # on ubuntu-latest, but guard so the job is self-contained.
          if ! command -v unzstd >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zstd
          fi
          # x86_64 runner -> the amd64 tarball. Pinned URL, fail loudly on a 404.
          # Must match 01-install-ollama.sh: the pinned asset is on the GitHub
          # release; ollama.com/download/v<ver>/<file> 404s (verified).
          url="https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst"
          echo "Fetching $url"
          curl -fsSL "$url" | sudo tar -x --use-compress-program=unzstd -C /usr \
            || { echo "FAIL: download/extract failed for $url"; exit 1; }
          command -v ollama >/dev/null 2>&1 || { echo "FAIL: ollama not on PATH after install"; exit 1; }
          ollama --version || true

      - name: Start `ollama serve` and wait until the API is ready
        run: |
          set -euo pipefail
          # The runner user is fine for a CPU smoke (the ISO runs it as the
          # 'ollama' system user via systemd — that unit is out of scope here).
          nohup ollama serve > ollama-serve.log 2>&1 &
          echo $! > ollama.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              echo "ollama up after ${i}s"; break
            fi
            sleep 1
            [ "$i" = 60 ] && { echo "FAIL: ollama never became ready"; tail -40 ollama-serve.log; exit 1; }
          done

      - name: Pull the tiny test model
        run: |
          set -euo pipefail
          ollama pull "$OLLAMA_TEST_MODEL"
          ollama list

      - name: Assert GET /api/tags returns 200
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:11434/api/tags)
          echo "/api/tags -> HTTP $code"
          [ "$code" = "200" ] || { echo "FAIL: /api/tags did not return 200 (got $code)"; exit 1; }

      - name: Assert one /v1/chat/completions round-trip (OpenAI-compatible)
        run: |
          set -euo pipefail
          # api_key is required-but-ignored -> literal "ollama". "model" field is
          # MANDATORY on Ollama's OpenAI endpoint.
          resp="$(curl -sf http://127.0.0.1:11434/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ollama' \
            -d "{\"model\":\"${OLLAMA_TEST_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with exactly: OK\"}],\"stream\":false}")"
          echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); print("completion:", d["choices"][0]["message"]["content"])'

      - name: Prove the repo's distro-ai-ask thin client gets a real answer
        run: |
          set -euo pipefail
          # distro-ai-ask reads OLLAMA_HOST (default 127.0.0.1:11434), auto-picks
          # the loaded/installed model via /api/ps then /api/tags, and POSTs to
          # /v1/chat/completions — the exact contract the overlay + Nautilus
          # action + AI mode all use.
          out="$(modes/ai/bin/distro-ai-ask 'Reply with exactly: OK' || true)"
          echo "distro-ai-ask returned: [$out]"
          [ -n "$out" ] || { echo "FAIL: distro-ai-ask returned empty"; tail -20 ollama-serve.log; exit 1; }
          echo "PASS: the :11434 Ollama serve contract + distro-ai-ask thin client work on CPU."

      - name: Stop the server
        if: always()
        run: '[ -f ollama.pid ] && kill "$(cat ollama.pid)" 2>/dev/null || true'

      - name: Server logs (on failure)
        if: failure()
        run: tail -60 ollama-serve.log || true
