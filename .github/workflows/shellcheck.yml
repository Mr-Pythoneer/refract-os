name: shellcheck

# Static analysis is the only "bug testing" available without real
# hardware (no GPU server, no test VM, no live desktop session) — see
# DESIGN.md and every modes/*/README.md status section. This is intended
# to catch what it can; it cannot replace running anything for real.

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck + bash -n
        shell: bash
        run: |
          set -euo pipefail

          # Discover by shebang, covering BOTH bash and POSIX-sh scripts. The
          # live-build hooks (iso/config/hooks/*.chroot, *.binary) are #!/bin/sh
          # — an earlier bash-only discovery skipped all 7 of them (including the
          # boot-fix hooks 0400-polish.chroot and 500-refract-bootfix.binary) yet
          # still printed "All clean", so they were never linted. Now they are.
          # modes/modectl/profiles/*.conf are deliberately excluded: they're
          # sourced data fragments with no shebang, not standalone scripts, and
          # shellchecking them alone produces false-positive "unused variable"
          # warnings for vars the sourcing script does use.
          # Classify by the FIRST LINE's shebang only. A plain `grep -rlE '^#!...'`
          # matches a shebang ANYWHERE in the file, so a bash script that GENERATES
          # a POSIX-sh script via a heredoc (e.g. iso/build.sh stages a '#!/bin/sh'
          # boot hook at line 253) gets wrongly listed as sh AND bash, then fails
          # when linted as sh (SC3010/SC3030/SC3054 for [[ ]], arrays, BASH_SOURCE).
          # Reading line 1 per file classifies each script exactly once, correctly.
          bash_files=(); sh_files=()
          while IFS= read -r f; do
            case "$(head -n1 "$f" 2>/dev/null)" in
              '#!/usr/bin/env bash'|'#!/bin/bash') bash_files+=("$f") ;;
              '#!/bin/sh')                         sh_files+=("$f")   ;;
            esac
          done < <(grep -rlE '^#!/(usr/bin/env bash|bin/bash|bin/sh)' . | grep -v '^\./\.git/')

          if [ "${#bash_files[@]}" -eq 0 ]; then
            echo "No bash scripts found — that's almost certainly the discovery mechanism breaking, not an empty repo." >&2
            exit 1
          fi

          echo "Checking ${#bash_files[@]} bash + ${#sh_files[@]} sh scripts:"
          printf '  [bash] %s\n' "${bash_files[@]}"
          [ "${#sh_files[@]}" -gt 0 ] && printf '  [sh]   %s\n' "${sh_files[@]}"

          echo "--- shellcheck (bash) ---"
          shellcheck -S warning "${bash_files[@]}"

          echo "--- bash -n ---"
          for f in "${bash_files[@]}"; do
            bash -n "$f"
          done

          if [ "${#sh_files[@]}" -gt 0 ]; then
            echo "--- shellcheck -s sh ---"
            shellcheck -s sh -S warning "${sh_files[@]}"

            echo "--- dash -n (POSIX syntax) ---"
            for f in "${sh_files[@]}"; do
              dash -n "$f" 2>/dev/null || sh -n "$f"
            done
          fi

          echo "All clean."

      - name: Smoke test — distro-modectl status
        shell: bash
        run: |
          # Real execution, not just lint: this is the one subcommand that
          # needs no root and no real systemd services to be meaningful.
          # It already caught a real bug once (set -e + a trailing && chain
          # silently making this exit 1 just because powerprofilesctl
          # wasn't installed — see TODO.md "CI / quality"). Keeping it as
          # an actual regression check, not just a one-off manual finding.
          set -euo pipefail
          ./modes/modectl/distro-modectl status

  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Calamares config YAML
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 - <<'PYEOF'
          import glob
          import sys

          import yaml

          files = glob.glob("iso/calamares/**/*.conf", recursive=True) + glob.glob(
              "iso/calamares/**/*.desc", recursive=True
          )
          if not files:
              print("No Calamares config files found — discovery glob broke.", file=sys.stderr)
              sys.exit(1)

          failed = False
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f"OK: {f}")
              except Exception as e:
                  print(f"FAIL: {f}: {e}", file=sys.stderr)
                  failed = True

          sys.exit(1 if failed else 0)
          PYEOF
