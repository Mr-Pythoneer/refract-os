name: build-iso

# Manual-only (workflow_dispatch), deliberately NOT on push/schedule. This
# repo's whole iso/ pipeline has never been run end to end by a human yet
# (live-build doesn't run on macOS, see iso/README.md "Status") -- this
# workflow is the first place it actually CAN run for real, since GitHub's
# ubuntu-latest runners are real Ubuntu VMs with root and loop-device
# access, unlike this Mac. Gating it to manual dispatch means a careless
# push doesn't burn CI minutes on a pipeline whose first real run might
# fail partway through and need iteration, and a nightly schedule isn't
# added until at least one manual run has actually succeeded.

on:
  workflow_dispatch:
    inputs:
      strain:
        description: "Strain to build"
        required: true
        default: "workstation"
        type: choice
        options:
          - workstation
          - laptop
          - lowspec
          - server
          - handheld
          - cloud
      publish_release:
        description: "Publish the ISO to GitHub Releases (public, no-login download)"
        required: false
        default: false
        type: boolean
      testing_no_login:
        description: "☠ DANGER: build a TESTING image with NO LOGIN / NO PASSWORD (dev only, never for users)"
        required: false
        default: false
        type: boolean
      # "What is this machine for?" — checked = the mode ships; UNCHECKED = the
      # mode is OMITTED ENTIRELY (provably absent, not merely hidden). 'normal'
      # is the always-on base desktop and is deliberately not a toggle. The
      # unchecked boxes are folded into REFRACT_OMIT_MODES below.
      include_gaming:
        description: "Include Gaming mode (Steam/Proton, Lutris, gamemode). Uncheck to omit it entirely."
        required: false
        default: true
        type: boolean
      include_ai:
        description: "Include AI mode (local Ollama LLMs, ComfyUI). Uncheck for a provably AI-free image."
        required: false
        default: true
        type: boolean
      include_server:
        description: "Include Server mode (SSH, Docker, Netdata). Uncheck to omit it entirely."
        required: false
        default: true
        type: boolean
      include_creative:
        description: "Include Creative mode (Blender, Kdenlive, FreeCAD). Uncheck to omit it entirely."
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write   # needed to create/update Releases
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        # Desktop ISOs (GNOME/LXQt + a full Ubuntu base) are large, and
        # ubuntu-latest runners ship a lot of preinstalled toolchains
        # (.NET, Android SDK, etc.) this build doesn't need. Removing them
        # up front rather than discovering a "no space left on device"
        # failure partway through a multi-hour-feeling live-build run.
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install live-build
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y live-build
          # Tools for build.sh's UEFI hybrid-remaster step (fold-in of uefi-remaster).
          sudo apt-get install -y xorriso grub-efi-amd64-bin grub-common mtools dosfstools isolinux

      # Fold the four include_* checkboxes into REFRACT_OMIT_MODES: an UNCHECKED
      # box means "omit this mode entirely". Also derive an artifact-name suffix
      # (e.g. -noai) so a mode-omitted build is distinguishable at a glance and
      # never overwrites a full build's artifact/release.
      - name: Compute mode omission
        id: modes
        run: |
          set -euo pipefail
          omit=""
          [ "${{ inputs.include_gaming }}" = "true" ]   || omit="$omit gaming"
          [ "${{ inputs.include_ai }}" = "true" ]       || omit="$omit ai"
          [ "${{ inputs.include_server }}" = "true" ]   || omit="$omit server"
          [ "${{ inputs.include_creative }}" = "true" ] || omit="$omit creative"
          omit="$(echo "$omit" | xargs || true)"   # collapse/trim whitespace
          suffix=""
          for m in $omit; do suffix="${suffix}-no${m}"; done
          {
            echo "omit=$omit"
            echo "suffix=$suffix"
          } >> "$GITHUB_OUTPUT"
          echo "REFRACT_OMIT_MODES='${omit:-<none>}'  artifact suffix='${suffix:-<none>}'"

      - name: Build ISO
        working-directory: iso
        env:
          REFRACT_TESTING: ${{ inputs.testing_no_login && '1' || '0' }}
          # sudo -E forwards this into build.sh, exactly like REFRACT_TESTING.
          REFRACT_OMIT_MODES: ${{ steps.modes.outputs.omit }}
        run: |
          set -euo pipefail
          sudo -E ./build.sh "${{ inputs.strain }}"

      # Prove the HARD guarantee: for every omitted mode, assert its footprint is
      # gone from the staged image (config/includes.chroot is what gets squashed
      # into the ISO). FAIL the build if anything leaked, so a "no-AI" image can
      # never silently ship AI. sudo because build.sh wrote these paths as root.
      - name: Assert omitted modes are provably absent
        if: ${{ success() && steps.modes.outputs.omit != '' }}
        working-directory: iso
        run: |
          set -uo pipefail
          inc=config/includes.chroot
          modectl="$inc/opt/distro/modes/modectl/distro-modectl"
          reg="$inc/etc/refract/enabled-modes"
          cala="$inc/etc/calamares"
          # Calamares surfaces only exist on NON-headless strains: build.sh rm -rf's
          # the whole /etc/calamares tree and only re-creates it for strains that
          # ship a desktop — server/cloud are headless (no installer GUI at all), so
          # only assert the STRIPPED installer surfaces where they can exist. This
          # list must track build.sh's HEADLESS_STRAINS=(server cloud).
          headless=0
          case "${{ inputs.strain }}" in server|cloud) headless=1 ;; esac
          fail=0
          for m in ${{ steps.modes.outputs.omit }}; do
            echo "== asserting mode '$m' is absent =="
            for p in "$inc/opt/distro/modes/$m" \
                     "$inc/opt/distro/modes/modectl/profiles/$m.conf" \
                     "$inc/usr/share/backgrounds/refract/$m.png"; do
              if sudo test -e "$p"; then echo "  LEAK: $p still present" >&2; fail=1; fi
            done
            if sudo ls "$inc/usr/local/bin/distro-$m-"* >/dev/null 2>&1; then
              echo "  LEAK: distro-$m-* symlink(s) still in PATH" >&2; fail=1
            fi
            if sudo grep -E '^ALL_MODES=' "$modectl" | grep -qw "$m"; then
              echo "  LEAK: '$m' still in distro-modectl ALL_MODES" >&2; fail=1
            fi
            if sudo grep -qw "$m" "$reg" 2>/dev/null; then
              echo "  LEAK: '$m' still in default /etc/refract/enabled-modes" >&2; fail=1
            fi
            # The three Calamares surfaces build.sh range-deletes for an omitted mode
            # (design §4.1-K): its packagechooser checkbox, its slideshow slide, and
            # its screenshot. Without these asserts a "no-$m" desktop ISO could still
            # render a $m checkbox that writes '$m' into the mode registry, or
            # advertise $m in the installer slideshow — the packagechooser_modes.conf
            # comment warns this exact gap. Skipped on headless strains (no tree).
            if [ "$headless" -eq 0 ]; then
              pc="$cala/modules/packagechooser_modes.conf"
              qml="$cala/branding/refractos/show.qml"
              # '# @item:<mode>' .. '# @enditem:<mode>' block (checkbox + its 'id:').
              if sudo grep -qE "@item:$m\$" "$pc" 2>/dev/null \
                 || sudo grep -qE "^[[:space:]]*- id: $m\$" "$pc" 2>/dev/null; then
                echo "  LEAK: '$m' checkbox still in packagechooser_modes.conf" >&2; fail=1
              fi
              # '// @slide:<mode>' .. '// @endslide:<mode>' slideshow slide.
              if sudo grep -qE "@slide:$m\$" "$qml" 2>/dev/null; then
                echo "  LEAK: '$m' slide still in branding/refractos/show.qml" >&2; fail=1
              fi
              # The per-mode screenshot the stripped checkbox pointed at.
              if sudo test -e "$cala/branding/refractos/$m.png"; then
                echo "  LEAK: $cala/branding/refractos/$m.png still present" >&2; fail=1
              fi
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "Absence assertion FAILED — an omitted mode leaked into the image." >&2
            exit 1
          fi
          echo "All omitted modes are provably absent from the staged image."

      # Rename the file itself so the DANGER is visible in the browser's
      # download list, the Downloads folder, and Rufus/Etcher's file picker —
      # not just in release notes nobody reads.
      - name: Mark testing ISO as DANGEROUS
        if: ${{ success() && inputs.testing_no_login }}
        run: |
          set -euo pipefail
          for f in iso/*.iso; do
            [ -e "$f" ] || continue
            mv "$f" "iso/DANGER-DO-NOT-USE-TESTING-NO-LOGIN-$(basename "$f")"
          done
          ls -la iso/*.iso

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # The DANGER marker goes at the END, not the front: every downstream VM
          # workflow (boot-smoke, screenshot-tour, install-smoke, uefi-boot,
          # mode-test) downloads with `pattern: refract-os-*`, so a name starting
          # with "DANGER-" matches nothing and those jobs die with a useless
          # "Failed to open refract.iso". The ISO FILE inside is still named
          # DANGER-DO-NOT-USE-TESTING-NO-LOGIN-*.iso, which is what a human
          # actually sees when they download and flash it.
          # {1} is the -no<mode> omission suffix (empty for a full build); it
          # keeps the refract-os-* prefix so downstream `pattern: refract-os-*`
          # jobs still match, while distinguishing e.g. refract-os-laptop-noai.
          name: ${{ inputs.testing_no_login && format('refract-os-{0}{1}-DANGER-TESTING-NO-LOGIN', inputs.strain, steps.modes.outputs.suffix) || format('refract-os-{0}{1}', inputs.strain, steps.modes.outputs.suffix) }}
          # Glob, not a fixed filename: if build.sh's rename step doesn't
          # run (build failed before producing output), this still uploads
          # whatever live-build did produce for debugging instead of the
          # whole step failing on a missing-file error.
          path: iso/*.iso
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to Releases (public, no-login download)
        if: ${{ success() && inputs.publish_release }}
        continue-on-error: true   # the ISO is already an artifact; a publish hiccup must not red-X the build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          ISO=$(ls iso/*.iso | head -n1)
          [ -n "$ISO" ] || { echo "no ISO produced — nothing to publish" >&2; exit 0; }
          base=$(basename "$ISO"); strain="${{ inputs.strain }}"
          # A mode-omitted build gets its OWN tag (e.g. latest-laptop-noai) so it
          # never overwrites the full latest-${strain} that most users download.
          suffix="${{ steps.modes.outputs.suffix }}"
          omit="${{ steps.modes.outputs.omit }}"
          # A testing image MUST NOT land on the tag real users download. It gets
          # its own tag, its own title, and its own notes; latest-${strain} stays
          # whatever the last real build published.
          if [ "${{ inputs.testing_no_login }}" = "true" ]; then
            tag="DANGER-testing-no-login-${strain}${suffix}"
          else
            tag="latest-${strain}${suffix}"
          fi
          sha=$(sha256sum "$ISO" | cut -d' ' -f1)
          echo "$sha  $base" > "iso/${strain}${suffix}.sha256"
          # GitHub release assets are capped at 2 GiB. Split larger ISOs into
          # < 2 GiB parts (users rejoin them) and upload the parts instead.
          limit=$((1900*1024*1024)); sz=$(stat -c%s "$ISO")
          assets=("iso/${strain}${suffix}.sha256")
          if [ "$sz" -le "$limit" ]; then
            assets+=("$ISO")
            reasm="It's a single file — just flash it."
          else
            ( cd iso && split -b 1900M --numeric-suffixes=0 --suffix-length=2 "$base" "${base}.part" )
            shopt -s nullglob; parts=(iso/"${base}".part*); shopt -u nullglob
            [ "${#parts[@]}" -ge 1 ] || { echo "split produced no parts — not publishing" >&2; exit 0; }
            assets+=("${parts[@]}")
            # Build the Windows rejoin command from the ACTUAL parts (any count),
            # not a hardcoded part00+part01 — 3+ parts would otherwise be truncated.
            win=""; for p in "${parts[@]}"; do bn=$(basename "$p"); win="${win:+$win + }$bn"; done
            reasm=$'This ISO is split into '"${#parts[@]}"' parts (GitHub caps assets at 2 GiB) — download every `.part*`, rejoin, then flash:\n- **Linux/macOS:** `cat '"${base}"'.part* > '"${base}"'`\n- **Windows (cmd):** `copy /b '"$win"' '"${base}"'`'
          fi
          if [ "${{ inputs.testing_no_login }}" = "true" ]; then
            title="⚠️ Testing build (${strain}) — no login, developer use only"
            notes="> **⚠️ This is not Refract OS.** It's a no-login developer testing image.
          > For the real thing, go to [**latest-${strain}**](https://github.com/${GITHUB_REPOSITORY}/releases/tag/latest-${strain}).

          ## What makes it dangerous
          It boots straight to a desktop with **no username, no password, and full \`sudo\`** — so anyone who touches the machine has complete control. It exists only so a developer can boot a test image without typing anything; it is not secure and not meant for real use.

          **Do not install it on a machine you care about, and do not hand it to anyone.**

          The image also identifies itself: volume label \`DANGER-TEST\`, filename \`DANGER-DO-NOT-USE-TESTING-NO-LOGIN-*\`, \`/etc/os-release\` reads *DANGER: TESTING BUILD*, and \`/etc/refract-TESTING-BUILD-DO-NOT-USE\` exists on the filesystem.

          ${reasm}

          SHA-256 of the joined ISO: \`${sha}\`

          Built from commit \`${GITHUB_SHA}\`.

          # ☠☠☠ DANGER — NO LOGIN — DO NOT USE ☠☠☠"
          else
            omitnote=""
            [ -n "$omit" ] && omitnote=" (modes provably omitted: ${omit})"
            title="Refract OS — latest ${strain}${suffix}"
            notes="Rolling latest **${strain}** build of Refract OS${omitnote}.

          **Flash it — Windows, macOS, or Linux:** balenaEtcher (any OS) or Rufus (Windows, *DD Image* mode). No Linux needed to install.

          ${reasm}

          SHA-256 of the joined ISO: \`${sha}\`

          ⚠ Boots via BIOS/CSM for now (UEFI in progress). Apple-Silicon Macs can create the USB but can't boot an x86 OS."
          fi
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            && gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes "$notes" --title "$title" \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
                 --title "$title" --notes "$notes" --prerelease
          # This step runs `set -uo pipefail` (no -e) and is continue-on-error, so a
          # failed upload would otherwise fall straight through to the "Published"
          # echo and report success while the release has NO ISO attached. Check the
          # upload exit status explicitly and fail THIS step (continue-on-error keeps
          # the ISO-already-an-artifact build green; we only refuse to lie about the
          # release having been published).
          if ! gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber; then
            echo "FAIL: 'gh release upload' did not complete — release '$tag' may be missing assets. Not reporting success." >&2
            exit 1
          fi
          echo "Published ${#assets[@]} asset(s) to release '$tag'."
