# Calamares packagechooser — the "what is this machine for?" page.
# Wired as instance packagechooser@modes (see settings.conf `instances:` +
# `show:`). Design: docs/mode-selection-design.md §3.1. Like the rest of this
# tree, UNVERIFIED against a running Calamares — see iso/calamares/README.md.
#
# mode: optionalmultiple  -> zero-or-more checkboxes ("pick any of four").
#   'normal' is the always-on base desktop, so it is deliberately NOT an item
#   and is never selectable here (the switcher force-enables it at read time).
# method: legacy          -> writes the GlobalStorage key `packagechooser_modes`
#   as a comma-separated list of the selected ids (empty string if none).
#   NOT method:packages — Refract modes are on-demand setup scripts under
#   modes/<mode>/setup/, not apt packages, so we only want to *capture* the
#   selection, not have Calamares' apt module install anything.
#
# screenshot: absolute path into the branding dir. build.sh rsyncs
# iso/calamares/ -> /etc/calamares/, so the per-mode PNGs shipped alongside this
# config land at /etc/calamares/branding/refractos/<mode>.png. A missing/
# unreadable file simply renders the item without a screenshot — the page still
# works.
#
# '# @item:<mode>' / '# @enditem:<mode>': build-time sentinels, one pair around
# each item, each marker alone on its line. For every mode in REFRACT_OMIT_MODES
# iso/build.sh range-deletes the enclosed item from its STAGED copy of this file
# (design §4.1-K), so an image that ships no AI cannot render an AI checkbox that
# writes 'ai' into a registry load_valid_modes() then drops. They are ordinary
# YAML comments and are inert in a normal build — but keep them paired, and keep
# every item inside a pair, or that mode becomes un-omittable.
mode: optionalmultiple
method: legacy

labels:
  step: "Modes"

