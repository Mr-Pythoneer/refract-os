# Calamares partition module config.
#
# Corrected against the real upstream schema (calamares/calamares,
# src/modules/partition/partition.conf, verified 2026-06). The earlier draft
# had two genuine schema errors — `efi.systemPartition` (should be the `efi:`
# map with `mountPoint`) and `userSwapChoices` wrongly nested under `efi`
# (it's top-level). Still unverified against an actual Calamares RUN — that
# needs a Linux host with the calamares package — but the keys/types/values
# below now match upstream, not a guess.

# EFI System Partition (replaces the old efiSystemPartition* flat keys).
efi:
  mountPoint:      "/boot/efi"
  recommendedSize: 300MiB
  minimumSize:     32MiB
  label:           "EFI"

# Default + offered filesystems for new/erased partitions.
defaultFileSystemType: "ext4"
availableFileSystemTypes:
  - ext4
  - btrfs

# Swap options offered to the user (TOP-LEVEL list), and which is preselected.
# initialSwapChoice must be one of these members.
userSwapChoices:
  - none
  - small
  - file
initialSwapChoice: file

# Initial automated-partitioning radio: none|erase|replace|alongside|manual.
# `none` = no radio pre-selected, so the user must consciously pick a scheme.
# Was `erase`, which pre-selected wipe-the-whole-disk — a dual-boot footgun on
# any machine that already has an OS. The schema explicitly allows `none`
# (it's the first documented value above), so this forces an explicit choice
# rather than defaulting to destructive.
initialPartitioningChoice: none
allowManualPartitioning: true

# Encryption generation (luks1|luks2). luks1 is the safe default — not all
# GRUB builds boot LUKS2/argon2id.
luksGeneration: luks1

# Whether to offer LVM-on-LUKS automated layouts.
lvm:
  enable: false

# Minimum disk size to install, in GiB (the welcome module's value, if set,
# takes precedence; this is the fallback).
requiredStorage: 5.5

# Partition-preview rendering.
drawNestedPartitions: false
alwaysShowPartitionLabels: true
