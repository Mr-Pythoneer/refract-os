# Calamares welcome module config.
# The three URLs resolve from branding.desc (supportUrl / releaseNotesUrl /
# knownIssuesUrl) — showing them gives the polished "real distro" welcome page.
showSupportUrl: true
showKnownIssuesUrl: true
showReleaseNotesUrl: true
showDonateUrl: false

requirements:
  requiredStorage: 20
  requiredRam: 4
  # Real reachable endpoint for the connectivity check (was example.com).
  internetCheckUrl: https://mr-pythoneer.github.io/refract-os/
  check:
    - storage
    - ram
    - power
    - internet
    - root
  required:
    - storage
    - ram
    - root
