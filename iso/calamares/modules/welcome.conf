# Calamares welcome module config.
# The three URLs resolve from branding.desc (supportUrl / releaseNotesUrl /
# knownIssuesUrl) — showing them gives the polished "real distro" welcome page.
showSupportUrl: true
showKnownIssuesUrl: true
showReleaseNotesUrl: true
showDonateUrl: false

requirements:
  # These thresholds are hard blocks (see `required:`) and are rsynced into
  # EVERY strain, including the lowspec strain for weak PCs. The old 20 GiB /
  # 4 GiB floor locked those exact machines out of installing. Lowered to a
  # realistic minimum that a low-spec box can actually meet, in the same
  # direction as partition.conf's requiredStorage: 5.5 (kept a touch higher
  # here to cover the full installed OS + headroom, and welcome's value takes
  # precedence over partition's). Left as hard requirements rather than warn-
  # only because a genuinely-too-small disk/RAM should fail cleanly up front,
  # not mid-install.
  requiredStorage: 8
  requiredRam: 2
  # Real reachable endpoint for the connectivity check (was example.com).
  internetCheckUrl: https://mr-pythoneer.github.io/refract-os/
  check:
    - storage
    - ram
    - power
    - internet
    - root
  required:
    - storage
    - ram
    - root
