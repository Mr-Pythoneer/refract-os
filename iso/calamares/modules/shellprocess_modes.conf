# Calamares shellprocess — persist the packagechooser@modes selection into the
# installed system. Wired as instance shellprocess@modes (see settings.conf
# `instances:` + `exec:`, sequenced after unpackfs so /opt/distro exists in the
# target). Design: docs/mode-selection-design.md §3.1/§3.4. UNVERIFIED against a
# running Calamares — see iso/calamares/README.md.
#
# dontChroot: false -> the command runs INSIDE the freshly-installed target
# root, so /opt/distro/... and /etc/refract/... are target-native paths.
#
# gs[packagechooser_modes] -> Calamares substitutes the GlobalStorage value the
# packagechooser wrote (the comma-separated selection, empty string if none).
# Quoted so an empty value is passed as a single empty argument, not dropped.
# NOTE: gs[] substitution is a relatively recent Calamares feature; if the
# shipped Calamares predates it the helper receives the literal string
# "gs[packagechooser_modes]" — distro-apply-mode-selection detects that and
# treats it as an empty selection (see design §3.4 substitution-risk note).
dontChroot: false
timeout: 60
script:
  - command: "/opt/distro/modes/modectl/distro-apply-mode-selection 'gs[packagechooser_modes]'"
    timeout: 60
