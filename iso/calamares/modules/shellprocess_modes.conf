# Calamares shellprocess — persist the packagechooser@modes selection into the
# installed system. Wired as instance shellprocess@modes (see settings.conf
# `instances:` + `exec:`, sequenced after unpackfs so /opt/distro exists in the
# target). Design: docs/mode-selection-design.md §3.1/§3.4. UNVERIFIED against a
# running Calamares — see iso/calamares/README.md.
#
# dontChroot: false -> the command runs INSIDE the freshly-installed target
# root, so /opt/distro/... and /etc/refract/... are target-native paths.
#
# ${gs[packagechooser_modes]} -> Calamares substitutes the GlobalStorage value
# the packagechooser wrote (the comma-separated selection, empty string if none).
# Quoted so an empty value is passed as a single empty argument, not dropped.
#
# THE BRACES ARE LOAD-BEARING. This was written as a bare `gs[packagechooser_modes]`,
# which Calamares does NOT expand — it passes the literal string through, so the
# helper saw a junk token, resolved it to "nothing selected", and EVERY install
# silently discarded the user's choice. Upstream's own shellprocess.conf documents
# the key form as `gs[key]` but the command form as `${gs[key]}` (its example is
# `${gs[branding.bootloader]}`); the same `${...}` wrapping applies to ROOT/USER/LANG.
dontChroot: false
timeout: 60
script:
  - command: "/opt/distro/modes/modectl/distro-apply-mode-selection '${gs[packagechooser_modes]}'"
    timeout: 60
