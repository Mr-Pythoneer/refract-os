# Calamares top-level settings. Format/keys per Calamares' documented
# schema (calamares.io/docs) — NOT verified against a running Calamares
# instance, see iso/calamares/README.md.

modules-search: [ local ]

# Named instances are used ONLY for the two mode-selection modules, so that the
# packagechooser writes GlobalStorage key `packagechooser_modes` and each loads
# its own modules/<name>_modes.conf (see docs/mode-selection-design.md §3.1).
# Every other module (unpackfs etc.) deliberately keeps its DEFAULT instance and
# is referenced bare in the sequence — a named `instances:` entry only applies
# to an `<module>@<id>` sequence entry, so the previous rootfs instance here was
# dead config: its unpackfs.conf override never took effect and, worse, no
# modules/unpackfs.conf existed at all, which aborted the install.
instances:
- { id: modes, module: packagechooser, config: packagechooser_modes.conf }
- { id: modes, module: shellprocess,   config: shellprocess_modes.conf }

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - packagechooser@modes
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - shellprocess@modes
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: refractos

prompt-install: true
dont-chroot: false
