# Crucible OS live-boot menu — plain isolinux text prompt, no theme.
#
# Why this file exists: Ubuntu's live-build fork (3.0~a57) defaults to the
# 'ubuntu-oneiric' syslinux theme + gfxboot-theme-ubuntu, packages that died
# ~Ubuntu 12.04 and don't exist in noble (first real CI build, run
# 28565364184, failed exactly there). With `--syslinux-theme live-build` the
# fork prefers this LOCAL template (config/bootloaders/isolinux) verbatim.
#
# Deliberately a single self-contained file: the fork special-cases files
# named live.cfg.in / live.cfg / install.cfg / splash.svg.in with decade-old
# logic (hardcoded binary/live paths, an undefined-variable sed, an rsvg
# binary noble no longer ships) — by shipping NONE of those names, all of
# that machinery is skipped and this config is used as-is.
#
# /casper/vmlinuz + /casper/initrd.img are stable names created by the
# config/hooks/500-crucible-bootfix.binary hook (the kernel lands there with
# a version suffix; nothing in the old fork renames it for casper images).

DEFAULT live
PROMPT 1
TIMEOUT 50
SAY Crucible OS live — booting automatically in 5s (Enter to boot now, or type: failsafe)

LABEL live
  KERNEL /casper/vmlinuz
  APPEND initrd=/casper/initrd.img boot=casper quiet splash ---

LABEL failsafe
  KERNEL /casper/vmlinuz
  APPEND initrd=/casper/initrd.img boot=casper noapic noacpi nosplash irqpoll ---
