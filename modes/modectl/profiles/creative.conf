# Creative mode profile — sourced by distro-modectl.
MODE_NAME="Creative"
CPU_GOVERNOR="performance"
POWER_PROFILE="performance"
ENABLE_SERVICES=()
DISABLE_SERVICES=()
STOP_AI_MODEL=true
CONFIRM_DISPLAY_MANAGER_STOP=false
GPU_PERF=max
PINNED_APPS=(org.freecad.FreeCAD.desktop org.blender.Blender.desktop org.kde.kdenlive.desktop)
NOTES="GPU encode/decode headroom (NVENC/NVDEC) for render/encode jobs — GPU_PERF=max pins max performance (best-effort, see distro-modectl apply_gpu_perf). Color-managed display profile is monitor-specific — scaffolded in modes/creative/bin/distro-creative-color (needs a real monitor + ICC profile). Flatpak .desktop IDs web-verified (2026-06): org.freecad.FreeCAD, org.blender.Blender, org.kde.kdenlive (lowercase). DaVinci Resolve omitted from the pin — its .run installer makes DaVinciResolve.desktop but the name varies by version; confirm with: ls /usr/share/applications | grep -i resolve."
# Per-mode desktop look (distro-modectl apply_theme): wallpaper.
WALLPAPER="/usr/share/backgrounds/refract/creative.png"
# Liquid glass (frosted blur) is OFF for this mode — real-time blur is GPU-heavy.
LIQUID_GLASS=false
