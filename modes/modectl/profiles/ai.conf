# AI mode profile — sourced by distro-modectl.
MODE_NAME="AI"
CPU_GOVERNOR="schedutil"
POWER_PROFILE="balanced"
ENABLE_SERVICES=()
DISABLE_SERVICES=()
STOP_AI_MODEL=false
AI_AUTOSTART_USECASE="coding"
CONFIRM_DISPLAY_MANAGER_STOP=false
GPU_PERF=auto
PINNED_APPS=()
NOTES="Auto-detects the hardware tier on first entry (distro-ai-detect-tier), then loads the LM Studio model for use-case \$AI_AUTOSTART_USECASE (default: coding) via distro-ai-model and ensures the OpenAI server is up on :8080. Requires modes/ai/setup/ (or distro-ai-setup --install) to have installed LM Studio + pulled models. Change AI_AUTOSTART_USECASE to any use-case in the active tier's modes/ai/config/models.catalog.<tier>.json (coding/cad/day-to-day/uncensored/assistant/vision)."
# Per-mode desktop look (distro-modectl apply_theme): wallpaper + Yaru accent.
WALLPAPER="/usr/share/backgrounds/refract/ai.png"
YARU_ACCENT="blue"
# Liquid glass (frosted blur) is OFF for this mode — real-time blur is GPU-heavy.
LIQUID_GLASS=false
