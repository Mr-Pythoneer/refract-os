# Normal mode profile — sourced by distro-modectl.
MODE_NAME="Normal"
CPU_GOVERNOR="schedutil"
POWER_PROFILE="balanced"
ENABLE_SERVICES=()
DISABLE_SERVICES=()
STOP_AI_MODEL=true
CONFIRM_DISPLAY_MANAGER_STOP=false
GPU_PERF=auto
PINNED_APPS=()
NOTES="The macOS look (WhiteSur + bottom dock) is baked into the image as the default; this switch re-asserts it, restores the Normal wallpaper, turns liquid-glass blur ON, and applies the balanced CPU/power profile + stops any running AI model. The modes/normal/setup/*.sh scripts remain for installed systems / manual re-apply. See modes/normal/README.md."
# Per-mode desktop look (distro-modectl apply_theme): wallpaper + macOS (WhiteSur)
# theme kept consistent across modes. YARU_ACCENT is legacy/unused (kept so old
# tooling that greps it doesn't break); the accent now lives in the wallpaper.
WALLPAPER="/usr/share/backgrounds/refract/normal.png"
YARU_ACCENT=""
# Liquid glass (frosted-blur macOS look) — ON for Normal only; every other mode
# turns it off so the compositor spends zero GPU on blur.
LIQUID_GLASS=true
