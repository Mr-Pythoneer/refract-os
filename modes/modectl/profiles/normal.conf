# Normal mode profile — sourced by distro-modectl.
MODE_NAME="Normal"
CPU_GOVERNOR="schedutil"
POWER_PROFILE="balanced"
ENABLE_SERVICES=()
DISABLE_SERVICES=()
STOP_AI_MODEL=true
CONFIRM_DISPLAY_MANAGER_STOP=false
GPU_PERF=auto
PINNED_APPS=()
NOTES="macOS-style theming is a one-time setup, not a per-switch toggle -- run modes/normal/setup/*.sh once (theme install + dock reposition + theme apply), not on every 'distro-modectl switch normal'. This switch only applies the balanced CPU/power profile and stops any running AI preset. See modes/normal/README.md."
# Per-mode desktop look (distro-modectl apply_theme): wallpaper + Yaru accent.
WALLPAPER="/usr/share/backgrounds/refract/normal.png"
YARU_ACCENT=""
# Liquid glass (frosted-blur macOS look) — ON for Normal only; every other mode
# turns it off so the compositor spends zero GPU on blur.
LIQUID_GLASS=true
