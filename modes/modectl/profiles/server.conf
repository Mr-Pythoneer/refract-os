# Server mode profile — sourced by distro-modectl.
MODE_NAME="Server"
CPU_GOVERNOR="powersave"
POWER_PROFILE="power-saver"
ENABLE_SERVICES=(ssh docker netdata)
DISABLE_SERVICES=(gdm)
STOP_AI_PRESET=true
DE_DCONF_FILE=""
CONFIRM_DISPLAY_MANAGER_STOP=true
NOTES="Disabling gdm drops the box to a text console on next boot/restart. distro-modectl asks for explicit confirmation before doing this — see DESIGN.md, Server mode is meant to be usable headless but shouldn't kill an active desktop session without the user saying so."
