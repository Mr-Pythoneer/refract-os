# Gaming mode profile — sourced by distro-modectl.
MODE_NAME="Gaming"
CPU_GOVERNOR="performance"
POWER_PROFILE="performance"
ENABLE_SERVICES=()
DISABLE_SERVICES=()
STOP_AI_MODEL=true
CONFIRM_DISPLAY_MANAGER_STOP=false
GPU_PERF=max
PINNED_APPS=(steam.desktop net.lutris.Lutris.desktop com.usebottles.bottles.desktop)
NOTES="GameMode is invoked per-launch by Steam/Lutris (gamemoderun), not run as a system service — nothing to enable here. PINNED_APPS desktop-file IDs web-verified (2026-06): steam-installer ships steam.desktop; Lutris uses reverse-DNS net.lutris.Lutris.desktop (old lutris.desktop is legacy); Bottles' Flatpak exports com.usebottles.bottles.desktop. GPU_PERF=max pins the Nvidia GPU to max performance (best-effort, see distro-modectl apply_gpu_perf)."
# Per-mode desktop look (distro-modectl apply_theme): wallpaper + Yaru accent.
WALLPAPER="/usr/share/backgrounds/refract/gaming.png"
YARU_ACCENT="red"
# Liquid glass (frosted blur) is OFF for this mode — real-time blur is GPU-heavy.
LIQUID_GLASS=false
